<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>404 — Page Not Found</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    h1 { font-size: 4rem; margin: 0; color: #6366f1; }
    p { font-size: 1.2rem; margin: 1rem 0 2rem; }
    a {
      color: #818cf8;
      text-decoration: none;
      border: 1px solid #818cf8;
      padding: 0.6rem 1.5rem;
      border-radius: 6px;
      transition: background 0.2s;
    }
    a:hover { background: #818cf8; color: #0a0a0a; }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>Page not found.</p>
    <a href="/">Go Home</a>
  </div>
</body>
</html>
